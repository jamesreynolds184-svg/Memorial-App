<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorial</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <style>
    #mem-name {
      padding-top: max(20px, env(safe-area-inset-top));
      margin-top: 0;
    }
  </style>
</head>
<body>
  <button id="burger-menu" class="burger-button" aria-label="Open menu">☰</button>

  <!-- Global search button (before or after burger menu) -->
  <button id="global-search-btn" class="search-toggle" aria-label="Search memorials">🔍</button>

  <nav id="menu-items" aria-label="Main">
    <a href="../home.html">Home</a>
    <a href="map.html">Map</a>
    <a href="ar-view.html">AR View</a>
    <a href="memorials.html">Find a Memorial</a>
    <a href="afm-list.html">Armed Forces Memorial</a>
    <a href="search-by-zone.html">Search by Zone</a>
    <a href="conflicts-by-year.html">Conflicts by Year</a>
    <a href="nearby-memorials.html">Nearby Memorials</a>
    <a href="saved.html">Saved</a>
  </nav>
  <div id="menu-overlay"></div>

  <!-- Global search overlay (after menu overlay) -->
  <div id="global-search-panel" aria-hidden="true">
    <div class="gsp-inner">
      <button id="gsp-close" class="gsp-close" aria-label="Close search">✕</button>
      <input id="global-search-input"
             type="text"
             placeholder="Search memorial titles..."
             autocomplete="off"
             aria-autocomplete="list"
             aria-expanded="false">
      <label class="gsp-desc-label">
        <input type="checkbox" id="global-search-desc-checkbox">
        Search description
      </label>
      <ul id="global-search-results" role="listbox"></ul>
    </div>
  </div>

  <main class="container" id="memorial-detail">
    <!-- Title at top -->
    <h1 id="mem-name" class="mem-title"></h1>

    <!-- Action buttons including back button -->
    <div class="mem-detail-actions">
      <button id="back-btn" class="btn btn-plain" type="button">← Back</button>
      <button id="read-aloud-btn" class="btn btn-accent" type="button" aria-pressed="false">Read aloud</button>
      <button id="save-memorial-btn" class="btn btn-accent" type="button">☆ Save</button>
      <button id="see-on-map-btn" class="btn btn-primary" type="button" style="display:none;">Find on map</button>
    </div>

    <p class="memorial-zone" id="mem-zone"></p>
    <p id="mem-desc"></p>
    <span id="mem-photo-path" style="font-size:0.9em;color:#888;display:none;"></span>
    <div id="mem-photo-wrapper" style="display:none;">
      <img id="mem-photo" class="mem-photo" alt="" loading="lazy" style="display:none;"/>
    </div>
    <div id="mem-gmap" style="width:100%;height:300px;border:1px solid #ccc;border-radius:6px;margin:1rem 0;display:none;"></div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/memorial.js"></script>
  <script defer
          src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="js/gestures.js"></script>
  <script src="../js/global-search.js"></script>
  <script src="../js/ios-menu.js"></script>
</body>
</html>
