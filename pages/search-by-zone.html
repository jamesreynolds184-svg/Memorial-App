<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search by Zone</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="memorials-bg">
  <button id="burger-menu" class="burger-button" aria-label="Open menu">☰</button>

  <nav id="menu-items" aria-label="Main">
    <a href="../home.html">Home</a>
    <a href="map.html">Map</a>
    <a href="memorials.html">Find a Memorial</a>
    <a href="afm-list.html">Armed Forces Memorial</a>
    <a href="search-by-zone.html">Search by Zone</a>
    <a href="conflicts-by-year.html">Conflicts by Year</a>
    <a href="nearby-memorials.html">Nearby Memorials</a>
    <a href="saved.html">Saved</a>
  </nav>

  <div id="menu-overlay"></div>

  <!-- Global search button (before or after burger menu) -->
  <button id="global-search-btn" class="search-toggle" aria-label="Search memorials">🔍</button>

  <!-- Global search overlay (after menu overlay) -->
  <div id="global-search-panel" aria-hidden="true">
    <div class="gsp-inner">
      <button id="gsp-close" class="gsp-close" aria-label="Close search">✕</button>
      <input id="global-search-input"
             type="text"
             placeholder="Search memorial titles..."
             autocomplete="off"
             aria-autocomplete="list"
             aria-expanded="false">
      <label class="gsp-desc-label">
        <input type="checkbox" id="global-search-desc-checkbox">
        Search description
      </label>
      <ul id="global-search-results" role="listbox"></ul>
    </div>
  </div>

  <main class="hero">
    <div class="welcome memorials-panel">
      <h1>Search by Zone</h1>

      <!-- Compact toolbar -->
      <div class="toolbar">
        <div id="zone-picker" class="zone-picker" aria-label="Zones"></div>
        <input id="search" class="search-input" type="text" placeholder="Search within this zone..." aria-label="Search memorials in selected zone">
        <div id="results-count" class="results-count" aria-live="polite"></div>
      </div>

      <ul id="memorial-list" class="memorials-list"></ul>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/search-by-zone.js"></script>
  <script src="js/gestures.js"></script>
  <script src="../js/global-search.js"></script>
  <script src="../js/ios-menu.js"></script>
</body>
</html>
