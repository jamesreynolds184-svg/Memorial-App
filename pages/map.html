<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map View</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
</head>
<body class="memorials-bg">
  <button id="burger-menu" class="burger-button" aria-label="Open menu">☰</button>
  <nav id="menu-items">
    <a href="../home.html">Home</a>
    <a href="map.html">Map</a>
    <a href="ar-view.html">AR Footpath View</a>
    <a href="memorials.html">Find a Memorial</a>
    <a href="afm-list.html">Armed Forces Memorial</a>
    <a href="search-by-zone.html">Search by Zone</a>
    <a href="conflicts-by-year.html">Conflicts by Year</a>
    <a href="nearby-memorials.html">Nearby Memorials</a>
    <a href="saved.html">Saved</a>
  </nav>
  <div id="menu-overlay"></div>

  <!-- Global search button (before or after burger menu) -->
  <button id="global-search-btn" class="search-toggle" aria-label="Search memorials">🔍</button>

  <!-- Global search overlay (after menu overlay) -->
  <div id="global-search-panel" aria-hidden="true">
    <div class="gsp-inner">
      <button id="gsp-close" class="gsp-close" aria-label="Close search">✕</button>
      <input id="global-search-input"
             type="text"
             placeholder="Search memorial titles..."
             autocomplete="off"
             aria-autocomplete="list"
             aria-expanded="false">
      <label class="gsp-desc-label">
        <input type="checkbox" id="global-search-desc-checkbox">
        Search description
      </label>
      <ul id="global-search-results" role="listbox"></ul>
    </div>
  </div>

  <main class="container" style="padding-top:70px;">
    <h1 style="margin:0 0 0.75rem;">Memorial Map</h1>
    <p style="margin:0 0 1rem;font-size:0.9rem;opacity:0.8;">Locate memorials that have coordinates. Use search or zone filter. Tap a pin to open its page.</p>

    <section id="map-panel" class="map-panel">
      <header class="map-toolbar">
        <div class="map-filters">
          <input id="map-search" type="text" placeholder="Search name..." aria-label="Search memorials">
          <select id="map-zone" aria-label="Filter by zone">
            <option value="">All zones</option>
          </select>
          <span id="map-count" class="map-count">0</span>
        </div>
        <div class="map-actions">
          <button id="map-locate" type="button" title="Single refresh location">📍</button>
          <button id="map-reset" type="button" title="Fit all markers">↺</button>
          <button id="map-expand" type="button" aria-expanded="false" title="Fullscreen map">⤢</button>
        </div>
      </header>
      <div id="map-wrap" class="map-wrap" role="region" aria-label="Memorials map"></div>
      <div id="route-info" class="route-info" hidden
           style="font:12px/1.4 system-ui,Arial,sans-serif;margin:6px 8px;
                  background:#fff;border:1px solid #ccc;border-radius:4px;
                  padding:6px 8px;box-shadow:0 1px 4px rgba(0,0,0,0.15);">
        <!-- Route details injected here -->
      </div>
      <ul id="map-list" class="map-list" aria-label="Filtered memorials"></ul>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../js/app.js"></script>
  <script src="../js/map-view.js"></script>
  <script src="../js/global-search.js"></script>
  <script src="../js/ios-menu.js"></script>
</body>
</html>
